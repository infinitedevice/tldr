---
# Conventional commit format enforcement
# Run: npx commitlint --from HEAD~1 --to HEAD
extends:
  - "@commitlint/config-conventional"
rules:
  type-enum:
    - 2
    - always
    - [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]
  scope-case:
    - 2
    - always
    - lower-case
  subject-case:
    - 2
    - never
    - [start-case, pascal-case, upper-case]
