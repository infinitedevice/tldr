name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: tldr-daemon-x86_64-linux
            cli_asset_name: tldr-cli-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            asset_name: tldr-daemon-aarch64-linux
            cli_asset_name: tldr-cli-aarch64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build binaries
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload daemon
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: target/${{ matrix.target }}/release/tldr-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: target/${{ matrix.target }}/release/tldr-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-flatpak:
    name: Build Flatpak
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install SDK
        run: |
          flatpak install -y --user flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08 \
            org.freedesktop.Sdk.Extension.node22//24.08

      - name: Build Flatpak
        run: |
          flatpak-builder --user --install-deps-from=flathub \
            --repo=flatpak-repo --force-clean \
            builddir packaging/flatpak/dev.tldr.App.yml

      - name: Bundle
        run: |
          flatpak build-bundle flatpak-repo tldr.flatpak dev.tldr.App \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: tldr.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
